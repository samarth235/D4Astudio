<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0D0D0D;--grey:#C0C0C0;--dark:#2A2A2A;--off:#F5F4F0;}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Courier New',Courier,monospace;}
#bgc{position:fixed;inset:0;z-index:0;will-change:transform;transform:translateZ(0);}

/* ── SPLASH ── */
#splash{
  position:fixed;top:0;left:0;width:100%;height:100vh;
  background:#000;display:flex;align-items:center;justify-content:center;
  z-index:99999;opacity:1;transition:opacity .8s ease;
}
#splash video{width:100%;max-width:480px;height:auto;display:block;}
#splash.fade-out{opacity:0;pointer-events:none;}

nav{position:fixed;top:0;left:0;right:0;z-index:200;padding:28px 52px;display:flex;justify-content:space-between;align-items:center;opacity:0;}
.logo{font-size:12px;font-weight:700;letter-spacing:.45em;color:var(--off);text-decoration:none;display:flex;align-items:center;}
.logo img{height:38px;width:auto;display:block;object-fit:contain;}
.logo .l{display:inline-block;}
.logo:hover .l{animation:ldrop .5s forwards;}
.logo:hover .l:nth-child(1){animation-delay:.00s}.logo:hover .l:nth-child(2){animation-delay:.03s}.logo:hover .l:nth-child(3){animation-delay:.06s}.logo:hover .l:nth-child(4){animation-delay:.09s}.logo:hover .l:nth-child(5){animation-delay:.12s}.logo:hover .l:nth-child(6){animation-delay:.15s}.logo:hover .l:nth-child(7){animation-delay:.18s}.logo:hover .l:nth-child(8){animation-delay:.21s}.logo:hover .l:nth-child(9){animation-delay:.24s}
@keyframes ldrop{0%{transform:translateY(0) skewX(0)}35%{transform:translateY(12px) skewX(-10deg);opacity:0}36%{transform:translateY(-12px) skewX(10deg);opacity:0}100%{transform:translateY(0) skewX(0);opacity:1}}
.navlinks{display:flex;gap:44px;list-style:none;}
.navlinks li a{font-size:10px;letter-spacing:.3em;color:var(--grey);text-decoration:none;display:flex;transition:color .4s;}
.navlinks li a:hover{color:var(--off);}
.navlinks li a span{display:inline-block;transition:transform .5s cubic-bezier(.19,1,.22,1);pointer-events:none;}
.navlinks li a:hover span{transform:translateY(-5px);}
.navlinks li a:hover span:nth-child(2n){transform:translateY(5px);}

#hero{position:fixed;left:50%;top:24%;z-index:100;text-align:center;pointer-events:none;user-select:none;opacity:0;}
.htitle{font-size:clamp(18px,4vw,20px);font-weight:400;letter-spacing:.55em;color:var(--off);line-height:1;margin-bottom:20px;white-space:nowrap;}
.cta{pointer-events:all;display:inline-block;font-size:10px;letter-spacing:.35em;color:var(--off);text-decoration:none;padding:13px 30px;position:relative;cursor:pointer;transition:letter-spacing .3s,background .3s;}
.cta:hover{letter-spacing:.45em;background:rgba(245,244,240,0.03);}
.cta-l{position:absolute;background:var(--off);transition:all .4s cubic-bezier(.16,1,.3,1);opacity:0;}
.cta-l.h{height:1px;width:0;left:50%;transform:translateX(-50%);}
.cta-l.v{width:1px;height:0;top:50%;transform:translateY(-50%);}
.cta-l.t{top:-1px;}.cta-l.b{bottom:-1px;}
.cta-l.l{left:-1px;}.cta-l.r{right:-1px;}
.cta:hover .cta-l.h{width:calc(100% + 40px);opacity:0.6;}
.cta:hover .cta-l.v{height:calc(100% + 40px);opacity:0.6;}
.cta-c{position:absolute;width:8px;height:8px;border:1px solid var(--off);transition:all .4s cubic-bezier(.16,1,.3,1);opacity:0.4;}
.cta-c.tl{top:0;left:0;border-right:0;border-bottom:0;}
.cta-c.tr{top:0;right:0;border-left:0;border-bottom:0;}
.cta-c.bl{bottom:0;left:0;border-right:0;border-top:0;}
.cta-c.br{bottom:0;right:0;border-left:0;border-top:0;}
.cta:hover .cta-c{width:12px;height:12px;opacity:1;}
.cta:hover .cta-c.tl{transform:translate(-6px,-6px);}
.cta:hover .cta-c.tr{transform:translate(6px,-6px);}
.cta:hover .cta-c.bl{transform:translate(-6px,6px);}
.cta:hover .cta-c.br{transform:translate(6px,6px);}

#gallery{position:fixed;bottom:0;left:0;right:0;height:58vh;z-index:60;}
#gstage{position:absolute;inset:0;perspective:1300px;perspective-origin:50% 42%;transform-style:preserve-3d;}
#gcont{position:absolute;top:50%;left:50%;width:1px;height:1px;transform-style:preserve-3d;}
.card{position:absolute;width:250px;height:350px;margin:-175px -125px;transform-style:preserve-3d;will-change:transform,opacity;cursor:pointer;}
.card .ci{width:100%;height:100%;position:relative;overflow:hidden;}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:filter .4s;}
.cinfo{position:absolute;bottom:0;left:0;right:0;padding:14px;background:linear-gradient(transparent,rgba(0,0,0,.9));transform:translateY(101%);transition:transform .32s cubic-bezier(.16,1,.3,1);}
.card:hover .cinfo{transform:translateY(0);}
.cname{font-size:15px;font-weight:700;letter-spacing:.2em;color:var(--off);margin-bottom:3px;}
.cyear{font-size:12px;letter-spacing:.25em;color:var(--grey);margin-bottom:3px;}
.cdesc{font-size:12px;color:rgba(255,255,255,.45);letter-spacing:.06em;}

#fs{position:fixed;inset:0;z-index:500;background:var(--bg);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;clip-path:inset(50% 50% 50% 50%);}
.fsx{position:absolute;top:28px;right:48px;font-size:22px;color:var(--off);opacity:.5;transition:opacity .2s;cursor:pointer;}
.fsx:hover{opacity:1;}
.fsc{display:flex;gap:60px;max-width:1100px;width:90%;align-items:center;}
.fsimg{flex:1;aspect-ratio:4/3;overflow:hidden;}
.fsimg img{width:100%;height:100%;object-fit:cover;display:block;}
.fstxt{flex:0 0 280px;}
.fstit{font-size:clamp(24px,2.5vw,30px);font-weight:700;letter-spacing:.3em;color:var(--off);margin-bottom:12px;}
.fsyr{font-size:12px;letter-spacing:.35em;color:var(--grey);margin-bottom:22px;}
.fsde{font-size:14px;line-height:1.6;color:rgba(255,255,255,.5);letter-spacing:.05em;}

#foot{position:fixed;bottom:12px;left:0;right:0;z-index:1000;display:flex;flex-direction:column;align-items:center;gap:5px;pointer-events:none;opacity:0;font-family:'sf corbel',Corbel,sans-serif;color:#fff;text-shadow:0 2px 10px rgba(0,0,0,0.8);}
#foot a{pointer-events:all;color:inherit;text-decoration:none;display:flex;align-items:center;gap:8px;transition:opacity .3s;}
#foot a:hover{opacity:.7;}
.ft-main-row{display:flex;align-items:center;gap:24px;flex-wrap:wrap;justify-content:center;}
.ft-row{display:flex;align-items:center;gap:8px;font-size:13px;letter-spacing:.05em;}
.ft-row b{font-weight:700;}
.ft-icons{display:flex;gap:20px;margin-top:2px;}
.ft-icons svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.5;}
.ft-icons .fill{fill:currentColor;stroke:none;}

#load{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;align-items:center;justify-content:center;transition:opacity .8s ease .3s;}
#load.hide{opacity:0;pointer-events:none;}
.loadtxt{font-size:9px;letter-spacing:.5em;color:var(--dark);animation:pulse 1.5s ease infinite;}
@keyframes pulse{0%,100%{opacity:.15}50%{opacity:.7}}

@media(max-width:800px){
  nav{padding:20px 24px;}
  .navlinks{display:none;}
  #hero{top:22%;}
  .htitle{font-size:16px;letter-spacing:0.55em;font-family:'Courier New',Courier,monospace;}
  .card{width:180px;height:250px;margin:-125px -90px;}
  .cinfo{padding:8px;}
  .cname{font-size:11px;}
  .cyear{font-size:10px;}
  .cdesc{font-size:10px;}
  #foot{bottom:8px;}
  .ft-main-row{gap:4px;flex-direction:column;}
  .ft-row{font-size:11px;}
  .fsc{flex-direction:column;gap:28px;}
  .fstxt{flex:0 0 auto;}
  .fsx{right:20px;}
  .logo img{height:28px;}
  .ham{display:flex !important;flex-direction:column;gap:6px;cursor:pointer;z-index:3000;position:relative;}
  .ham span{display:block;width:24px;height:1px;background:var(--off);transition:all .4s cubic-bezier(.16,1,.3,1);}
  .ham span:nth-child(2){width:16px;align-self:flex-end;}
  .ham span:nth-child(3){width:10px;align-self:flex-end;}
  .ham.active span{width:24px !important;align-self:center;}
  .ham.active span:nth-child(1){transform:translateY(7px) rotate(45deg);}
  .ham.active span:nth-child(2){opacity:0;transform:translateX(10px);}
  .ham.active span:nth-child(3){transform:translateY(-7px) rotate(-45deg);}
  #gallery{left:50%;transform:translateX(-50%);width:100%;}
  #gstage{perspective-origin:50% 50%;}
  #hero{width:90%;text-align:center;}
  .htitle{white-space:normal;}
}
.ham{display:none;}
#mob-nav{position:fixed;inset:0;background:var(--bg);z-index:2500;display:flex;flex-direction:column;align-items:center;justify-content:center;clip-path:polygon(0 0,100% 0,100% 0,0 0);transition:clip-path .8s cubic-bezier(.77,0,.175,1);pointer-events:none;}
#mob-nav.active{clip-path:polygon(0 0,100% 0,100% 100%,0 100%);pointer-events:all;}
.mob-links{list-style:none;text-align:center;}
.mob-links li{margin:30px 0;overflow:hidden;}
.mob-links a{font-size:28px;letter-spacing:.3em;color:var(--off);text-decoration:none;display:block;transform:translateY(100%);transition:transform .8s cubic-bezier(.16,1,.3,1);font-weight:300;}
#mob-nav.active .mob-links a{transform:translateY(0);}
#mob-nav.active .mob-links li:nth-child(1) a{transition-delay:.3s;}
#mob-nav.active .mob-links li:nth-child(2) a{transition-delay:.4s;}
#mob-nav.active .mob-links li:nth-child(3) a{transition-delay:.5s;}
</style>
</head>

<script>
// ─────────────────────────────────────────────
// DEVICE DETECTION
// ─────────────────────────────────────────────
const isMobile    = window.innerWidth < 800;
const isLowEnd    = isMobile || navigator.hardwareConcurrency <= 4;
const BG_FPS      = isLowEnd ? 30 : 60;
const BG_INTERVAL = 1000 / BG_FPS;

let W = window.innerWidth, H = window.innerHeight;
let mouseX = W / 2, mouseY = H / 2;

// ─────────────────────────────────────────────
// SPLASH + GATE
// ─────────────────────────────────────────────
let carouselReady = false;
(function () {
  const navType    = performance.getEntriesByType('navigation')[0].type;
  const hasVisited = sessionStorage.getItem('hasVisitedD4A');
  const splash     = document.getElementById('splash');
  const splashVid  = document.getElementById('splashVideo');
  const loadEl     = document.getElementById('load');
  function hideSplash() {
    splash.classList.add('fade-out');
    setTimeout(() => { splash.style.display = 'none'; loadEl.classList.add('hide'); carouselReady = true; }, 800);
  }
  if (!hasVisited || navType === 'reload') {
    sessionStorage.setItem('hasVisitedD4A', 'true');
    splashVid.addEventListener('ended', hideSplash);
    splashVid.muted = true;
    const p = splashVid.play();
    if (p !== undefined) p.catch(() => {
      document.body.addEventListener('touchstart', () => splashVid.play(), { once: true });
    });
  } else {
    splash.style.display = 'none'; loadEl.classList.add('hide'); carouselReady = true;
  }
})();

// ─────────────────────────────────────────────
// PROJECTS DATA
// ─────────────────────────────────────────────
const PROJECTS = [
  { name:'Amarta CH',  year:'2023', desc:'Post-tensioned concrete megastructure, 380m',            img:'Amarta CH.webp',                   full:'A fundamental rethinking of the high-rise form — structural expression and spatial efficiency converge into a singular tectonic gesture. Exposed post-tension cables define both facade and interior character across 380 metres of built space.' },
  { name:'Amarta EP',  year:'2022', desc:'Folded steel surface pavilion, temporary installation',  img:'Amarta EP.webp',                   full:'Material investigation into the threshold between surface and structure. A single continuous steel sheet, folded through computational geometry, generates all enclosure, support and programme without discrete elements.' },
  { name:'Amarta MO',  year:'2021', desc:'Carbon fibre pedestrian crossing, parametric form',      img:'Amarta MO.webp',                   full:'Spanning 180 metres with a section depth of only 900mm. Carbon fibre composite allows structural performance impossible in conventional materials — form derived entirely from force-flow visualisation of the load paths.' },
  { name:'Urban Edge', year:'2022', desc:'Exposed concrete residential, brutalist sectional logic', img:'Scene1.webp',                      full:'The section drawing as architectural generator. Each floor level is displaced and exposed to the exterior, making the logic of section — normally invisible — the primary spatial and aesthetic experience.' },
  { name:'RRN LUX',   year:'2023', desc:'ETFE tensile research facility, adaptive envelope',       img:'Scene2.webp',                      full:'A research facility whose envelope is the experiment. The ETFE cushion system monitors and responds to thermal, acoustic and light conditions — making environmental performance a direct spatial phenomenon.' },
  { name:'',           year:'2020', desc:'Public monument, structural grid as cultural artifact',  img:'Screenshot 2026-01-13 192650.png', full:'An abstract monument where the structural grid — the invisible armature of all buildings — becomes the subject. A 12-metre cube of pure structural logic, without programme, without enclosure.' },
];

// ─────────────────────────────────────────────
// WEBGL BACKGROUND
// The JS physics (stepGrid / stepParticles) is
// IDENTICAL to the original Canvas 2D version.
// Only the draw calls move to WebGL — one GPU
// upload + draw call per primitive type per frame
// instead of hundreds of canvas API calls.
// ─────────────────────────────────────────────
const canvas = document.getElementById('bgc');

// Acquire WebGL context — alpha:false composites
// against the body bg without an extra blend step.
const gl = (function () {
  const opts = {
    antialias: false, alpha: false,
    depth: false, stencil: false,
    powerPreference: 'high-performance'
  };
  try {
    return canvas.getContext('webgl', opts) ||
           canvas.getContext('experimental-webgl', opts);
  } catch (_) { return null; }
})();

if (!gl) console.warn('D4A: WebGL unavailable — background will not render.');

// ── GLSL shaders ──────────────────────────────

// Line shader
// Vertex layout: [x, y, alpha]  — stride 12 bytes
const LINE_VS = `
  attribute vec2  aPos;
  attribute float aAlpha;
  uniform   vec2  uRes;
  varying   float vAlpha;
  void main(){
    vec2 c = (aPos / uRes) * 2.0 - 1.0;
    gl_Position = vec4(c.x, -c.y, 0.0, 1.0);
    vAlpha = aAlpha;
  }`;
const LINE_FS = `
  precision mediump float;
  uniform vec3  uColor;
  varying float vAlpha;
  void main(){
    gl_FragColor = vec4(uColor, vAlpha);
  }`;

// Point shader
// Vertex layout: [x, y, alpha, size]  — stride 16 bytes
// Point sprite FS clips to circle so dots stay round.
const POINT_VS = `
  attribute vec2  aPos;
  attribute float aAlpha;
  attribute float aSize;
  uniform   vec2  uRes;
  varying   float vAlpha;
  void main(){
    vec2 c = (aPos / uRes) * 2.0 - 1.0;
    gl_Position  = vec4(c.x, -c.y, 0.0, 1.0);
    vAlpha       = aAlpha;
    gl_PointSize = aSize;
  }`;
const POINT_FS = `
  precision mediump float;
  uniform vec3  uColor;
  varying float vAlpha;
  void main(){
    vec2 uv = gl_PointCoord - vec2(0.5);
    if(length(uv) > 0.5) discard;
    gl_FragColor = vec4(uColor, vAlpha);
  }`;

// ── Shader compiler ───────────────────────────
function makeProgram(vsSrc, fsSrc) {
  function compile(type, src) {
    const s = gl.createShader(type);
    gl.shaderSource(s, src);
    gl.compileShader(s);
    return s;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, compile(gl.VERTEX_SHADER,   vsSrc));
  gl.attachShader(prog, compile(gl.FRAGMENT_SHADER, fsSrc));
  gl.linkProgram(prog);
  return prog;
}

// Programs and their attribute / uniform locations
let lineProg, pointProg;
let ll_aPos, ll_aAlpha, ll_uRes, ll_uColor;
let pp_aPos, pp_aAlpha, pp_aSize, pp_uRes, pp_uColor;
let glLineBuf, glPointBuf;

// Pre-allocated Float32Arrays reused every frame —
// avoids GC pressure from recreating arrays each tick.
//
// Worst-case sizes:
//   Grid lines : ~4 000 verts × 3 floats = 12 000
//   Particle lines: 1 800 × 7 trail segs × 2 verts × 3 = 75 600
//   Dashes     : 540 × 2 × 3 = 3 240
//   Total line floats needed: ~91 000  → allocate 150 000
//
//   Point verts: 1 260 dot particles × 4 + 814 node dots × 4 = 8 296
//   → allocate 30 000
const MAX_LF = 150000;
const MAX_PF = 30000;
const lineArr  = new Float32Array(MAX_LF);
const pointArr = new Float32Array(MAX_PF);
let lI = 0, pI = 0;  // write cursors (reset before each draw batch)

function glInit() {
  if (!gl) return;
  lineProg  = makeProgram(LINE_VS,  LINE_FS);
  pointProg = makeProgram(POINT_VS, POINT_FS);

  // Line program locations
  ll_aPos   = gl.getAttribLocation(lineProg,  'aPos');
  ll_aAlpha = gl.getAttribLocation(lineProg,  'aAlpha');
  ll_uRes   = gl.getUniformLocation(lineProg, 'uRes');
  ll_uColor = gl.getUniformLocation(lineProg, 'uColor');

  // Point program locations
  pp_aPos   = gl.getAttribLocation(pointProg,  'aPos');
  pp_aAlpha = gl.getAttribLocation(pointProg,  'aAlpha');
  pp_aSize  = gl.getAttribLocation(pointProg,  'aSize');
  pp_uRes   = gl.getUniformLocation(pointProg, 'uRes');
  pp_uColor = gl.getUniformLocation(pointProg, 'uColor');

  glLineBuf  = gl.createBuffer();
  glPointBuf = gl.createBuffer();

  gl.enable(gl.BLEND);
  gl.blendFunc(gl.SRC_ALPHA, gl.ONE_MINUS_SRC_ALPHA);
  gl.clearColor(13/255, 13/255, 13/255, 1.0); // #0D0D0D
}

// Upload lineArr[0..lI) and draw as GL_LINES in the given colour.
// Resets lI to 0 after the call.
function flushLines(r, g, b) {
  if (!gl || lI === 0) return;
  gl.useProgram(lineProg);
  gl.uniform2f(ll_uRes, W, H);
  gl.uniform3f(ll_uColor, r, g, b);
  gl.bindBuffer(gl.ARRAY_BUFFER, glLineBuf);
  gl.bufferData(gl.ARRAY_BUFFER, lineArr.subarray(0, lI), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(ll_aPos);
  gl.enableVertexAttribArray(ll_aAlpha);
  gl.vertexAttribPointer(ll_aPos,   2, gl.FLOAT, false, 12, 0);
  gl.vertexAttribPointer(ll_aAlpha, 1, gl.FLOAT, false, 12, 8);
  gl.drawArrays(gl.LINES, 0, lI / 3);
  lI = 0;
}

// Upload pointArr[0..pI) and draw as GL_POINTS in the given colour.
// Resets pI to 0 after the call.
function flushPoints(r, g, b) {
  if (!gl || pI === 0) return;
  gl.useProgram(pointProg);
  gl.uniform2f(pp_uRes, W, H);
  gl.uniform3f(pp_uColor, r, g, b);
  gl.bindBuffer(gl.ARRAY_BUFFER, glPointBuf);
  gl.bufferData(gl.ARRAY_BUFFER, pointArr.subarray(0, pI), gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(pp_aPos);
  gl.enableVertexAttribArray(pp_aAlpha);
  gl.enableVertexAttribArray(pp_aSize);
  gl.vertexAttribPointer(pp_aPos,   2, gl.FLOAT, false, 16, 0);
  gl.vertexAttribPointer(pp_aAlpha, 1, gl.FLOAT, false, 16, 8);
  gl.vertexAttribPointer(pp_aSize,  1, gl.FLOAT, false, 16, 12);
  gl.drawArrays(gl.POINTS, 0, pI / 4);
  pI = 0;
}

// ── Physics — identical to original ───────────
let COLS, ROWS, nodes = [], particles = [];
let scatterX = -9999, scatterY = -9999;
let lastBgTick = 0;

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });

function buildGrid() {
  nodes = [];
  const sx = W / (COLS - 1), sy = H / (ROWS - 1);
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < COLS; c++) {
    const ox = c * sx, oy = r * sy;
    nodes.push({ ox, oy, x: ox, y: oy, vx: 0, vy: 0 });
  }
}

function buildParticles() {
  particles = [];
  const N = isLowEnd
    ? Math.min(500,  Math.floor(W * H / 3000))
    : Math.min(1800, Math.floor(W * H / 900));
  for (let i = 0; i < N; i++) particles.push({
    x: Math.random() * W,  y: Math.random() * H,
    vx: (Math.random() - .5) * .3, vy: (Math.random() - .5) * .3,
    sz: Math.random() * .9 + .3,   al: Math.random() * .55 + .15,
    dash: Math.random() < .3, ang: Math.random() * Math.PI,
    len: Math.random() * 8 + 3,
    trail: [], tlen: Math.floor(Math.random() * 5 + 2)
  });
}

function stepGrid() {
  for (const n of nodes) {
    n.vx += (n.ox - n.x) * .14;
    n.vy += (n.oy - n.y) * .14;
    const dx = n.x - mouseX, dy = n.y - mouseY, d2 = dx*dx + dy*dy;
    if (d2 < 200*200) {
      const d = Math.sqrt(d2) || 1, f = .22 * (1 - d/200) * (1 - d/200);
      n.vx += dx/d * f * 130; n.vy += dy/d * f * 130;
    }
    const cx = n.x - scatterX, cy = n.y - scatterY, cd2 = cx*cx + cy*cy;
    if (cd2 < 130*130) {
      const cd = Math.sqrt(cd2) || 1, cf = .1 * (1 - cd/130) * (1 - cd/130);
      n.vx += cx/cd * cf * 70; n.vy += cy/cd * cf * 70;
    }
    n.vx *= .78; n.vy *= .78;
    n.x += n.vx; n.y += n.vy;
  }
}

function stepParticles() {
  for (const p of particles) {
    const dx = p.x - mouseX, dy = p.y - mouseY, d = Math.sqrt(dx*dx + dy*dy);
    if (d < 150) {
      const f = .011 * (1 - d/150) * (1 - d/150);
      p.vx += dx/d * f * 110; p.vy += dy/d * f * 110;
    }
    p.vx += (W * .5 - p.x) * .000012;
    p.vy += (H * .5 - p.y) * .000012;
    p.vx *= .97; p.vy *= .97;
    p.trail.push({ x: p.x, y: p.y });
    if (p.trail.length > p.tlen) p.trail.shift();
    p.x += p.vx; p.y += p.vy; p.ang += .007;
    if (p.x < -30) p.x = W + 30; if (p.x > W + 30) p.x = -30;
    if (p.y < -30) p.y = H + 30; if (p.y > H + 30) p.y = -30;
  }
}

// ── WebGL draw — replaces Canvas 2D draw fns ──
//
// drawGrid():
//   Pass 1 — build all grid line vertices into lineArr,
//             upload once, draw as GL_LINES (white).
//   Pass 2 — build node-highlight dot vertices into
//             pointArr, upload once, draw as GL_POINTS.
//
// drawParticles():
//   Single pass — build trail segments + dash lines
//   into lineArr AND dot vertices into pointArr in the
//   same loop; upload + draw each at the end (grey).

function drawGrid() {
  if (!gl) return;

  // ── Pass 1: grid lines ──────────────────────
  lI = 0;
  // Horizontal segments
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS - 1; c++) {
      const n1 = nodes[r * COLS + c], n2 = nodes[r * COLS + c + 1];
      const mx = (n1.x + n2.x) * .5 - mouseX, my = (n1.y + n2.y) * .5 - mouseY;
      const d  = Math.sqrt(mx*mx + my*my);
      const a  = d < 260 ? .06 + .3 * (1 - d / 260) : .15;
      lineArr[lI++] = n1.x; lineArr[lI++] = n1.y; lineArr[lI++] = a;
      lineArr[lI++] = n2.x; lineArr[lI++] = n2.y; lineArr[lI++] = a;
    }
  }
  // Vertical segments
  for (let c = 0; c < COLS; c++) {
    for (let r = 0; r < ROWS - 1; r++) {
      const n1 = nodes[r * COLS + c], n2 = nodes[(r + 1) * COLS + c];
      const mx = (n1.x + n2.x) * .5 - mouseX, my = (n1.y + n2.y) * .5 - mouseY;
      const d  = Math.sqrt(mx*mx + my*my);
      const a  = d < 260 ? .06 + .3 * (1 - d / 260) : .15;
      lineArr[lI++] = n1.x; lineArr[lI++] = n1.y; lineArr[lI++] = a;
      lineArr[lI++] = n2.x; lineArr[lI++] = n2.y; lineArr[lI++] = a;
    }
  }
  flushLines(1, 1, 1); // white grid

  // ── Pass 2: node highlight dots near mouse ──
  pI = 0;
  for (const n of nodes) {
    const dx = n.x - mouseX, dy = n.y - mouseY;
    const d  = Math.sqrt(dx*dx + dy*dy);
    if (d < 160) {
      const a = .85 * (1 - d / 160);
      // Original drew arc(n.x, n.y, 1.3, ...) → radius 1.3 → gl_PointSize = 2.6
      pointArr[pI++] = n.x; pointArr[pI++] = n.y;
      pointArr[pI++] = a;   pointArr[pI++] = 2.6;
    }
  }
  flushPoints(245/255, 244/255, 240/255); // #F5F4F0
}

function drawParticles() {
  if (!gl) return;
  lI = 0; pI = 0;

  for (const p of particles) {
    if (!p.dash) {
      // Dot particle — point sprite
      // Original: ctx.arc(p.x, p.y, p.sz, ...) where p.sz = 0.3–1.2
      // → gl_PointSize = diameter = p.sz * 2
      pointArr[pI++] = p.x; pointArr[pI++] = p.y;
      pointArr[pI++] = p.al; pointArr[pI++] = p.sz * 2;

      // Trail — GL_LINES segment pairs matching the original moveTo/lineTo path
      if (p.trail.length > 1) {
        const ta = p.al * .2;
        for (let t = 0; t < p.trail.length - 1; t++) {
          lineArr[lI++] = p.trail[t].x;     lineArr[lI++] = p.trail[t].y;     lineArr[lI++] = ta;
          lineArr[lI++] = p.trail[t + 1].x; lineArr[lI++] = p.trail[t + 1].y; lineArr[lI++] = ta;
        }
      }
    } else {
      // Dash particle — rotating line segment
      const cs = Math.cos(p.ang), sn = Math.sin(p.ang);
      const a  = p.al * .9;
      lineArr[lI++] = p.x - cs * p.len; lineArr[lI++] = p.y - sn * p.len; lineArr[lI++] = a;
      lineArr[lI++] = p.x + cs * p.len; lineArr[lI++] = p.y + sn * p.len; lineArr[lI++] = a;
    }
  }

  flushLines(192/255, 192/255, 192/255);   // #C0C0C0 — trails + dashes
  flushPoints(192/255, 192/255, 192/255);  // #C0C0C0 — dot particles
}

function bgLoop(now) {
  if (now - lastBgTick < BG_INTERVAL) return;
  lastBgTick = now;
  if (gl) gl.clear(gl.COLOR_BUFFER_BIT);
  stepGrid();      drawGrid();
  stepParticles(); drawParticles();
}

// ─────────────────────────────────────────────
// RESIZE — canvas + GL viewport
// ─────────────────────────────────────────────
function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  if (gl) gl.viewport(0, 0, W, H);
  const spacing = isLowEnd ? 40 : 55;
  COLS = Math.ceil(W / spacing) + 2;
  ROWS = Math.ceil(H / spacing) + 2;
  buildGrid();
  buildParticles();
}

// ─────────────────────────────────────────────
// CAROUSEL — unchanged
// ─────────────────────────────────────────────
const gcont  = document.getElementById('gcont');
const gstage = document.getElementById('gstage');
let rot = 0, rotV = 0;
let dragging = false, lastDX = 0, dragV = 0, hovered = -1;
const cards = [];

const PHASE1_DUR = 1200;
const PHASE2_DUR = 2800;
const HIGH_SPEED = 18.0;
const LOW_SPEED  = 0.1;
const MAX_BLUR   = isLowEnd ? 0 : 2;

let isIntroActive      = true;
let introP             = 0;
let lastPhysicsTick    = Date.now();
let elapsedPhysicsTime = 0;
let revealDone         = false;

function easeOutCubic(x) { return 1 - Math.pow(1 - x, 3); }

function tickTransition() {
  if (!isIntroActive) return;
  const now = Date.now();
  let   dt  = now - lastPhysicsTick;
  lastPhysicsTick = now;
  if (!carouselReady) return;
  if (hovered !== -1) dt *= 0.3;
  elapsedPhysicsTime += dt;
  if (elapsedPhysicsTime < PHASE1_DUR) {
    rotV = HIGH_SPEED; introP = 0;
  } else {
    const t = Math.min((elapsedPhysicsTime - PHASE1_DUR) / PHASE2_DUR, 1);
    introP  = easeOutCubic(t);
    rotV    = HIGH_SPEED * (1 - introP) + LOW_SPEED * introP;
    if (t >= 1) { isIntroActive = false; rotV = LOW_SPEED; introP = 1; }
  }
}

PROJECTS.forEach((p, i) => {
  const card = document.createElement('div');
  card.className = 'card';
  card.innerHTML = `<div class="ci"><img src="${p.img}" alt="${p.name}" loading="lazy" decoding="async"><div class="cinfo"><div class="cname">${p.name}</div><div class="cyear">${p.year}</div><div class="cdesc">${p.desc}</div></div></div>`;
  gcont.appendChild(card);
  cards.push(card);
  card.addEventListener('mouseenter', () => {
    hovered = i;
    const r = card.getBoundingClientRect();
    scatterX = r.left + r.width / 2;
    scatterY = r.top  + r.height / 2;
  });
  card.addEventListener('mouseleave', () => { hovered = -1; scatterX = -9999; scatterY = -9999; });
  card.addEventListener('click', () => openFS(i));
});

function placeCards() {
  const N  = cards.length;
  const gW = gstage.offsetWidth;
  const gH = gstage.offsetHeight;
  let RX_FULL    = Math.min(gW * 0.35, 340);
  let RY_FULL    = gH * 0.20;
  let y_off_base = -170;
  if (W < 800) { RX_FULL = 240; RY_FULL = 140; y_off_base = -100; }
  const RX_START = RX_FULL * 0.05;

  cards.forEach((card, i) => {
    const stagger  = i * 0.12;
    const cardP    = Math.max(0, Math.min(1, (introP - stagger) / (1 - stagger * 0.8)));
    const easeP    = 1 - Math.pow(1 - cardP, 3);
    const cur_rx   = RX_START + (RX_FULL  - RX_START) * easeP;
    const cur_ry_y = RX_START + (RY_FULL * 0.2 - RX_START) * easeP;
    const cur_ry_z = RY_FULL  * easeP;
    const yOffset  = y_off_base * easeP - H * 0.47 * (1 - easeP);
    const a        = (rot + (360 / N) * i) * Math.PI / 180;
    const x        = Math.cos(a) * cur_rx;
    const flt      = Math.sin(Date.now() * 0.0015 + i * 0.8) * 12 * easeP;
    const y        = Math.sin(a) * cur_ry_y + yOffset + flt;
    const z        = Math.sin(a) * cur_ry_z;
    const depth    = (z + RY_FULL) / (2 * RY_FULL);
    const sc       = (0.65 + depth * 0.6) * easeP;
    const op       = (0.35 + depth * 0.65) * easeP;
    const zi       = Math.round(depth * 100);
    const blur     = isLowEnd ? 0 : (MAX_BLUR * (1 - easeP)).toFixed(2);
    const rY       = (Math.cos(a) * 15 * easeP).toFixed(1);

    card.style.transform = i === hovered
      ? `translate3d(${x}px,${y - 40}px,${z}px) scale(${sc * 1.3}) rotateY(${rY}deg)`
      : `translate3d(${x}px,${y}px,${z}px) scale(${sc}) rotateY(${rY}deg)`;
    card.style.opacity = (i === hovered ? op : op * (hovered >= 0 ? 0.5 : 1)).toFixed(2);
    card.style.zIndex  = i === hovered ? 220 : zi;

    const img = card.querySelector('img');
    if (img) {
      img.style.filter = i === hovered
        ? 'brightness(1) contrast(1)'
        : isLowEnd
          ? 'brightness(0.82) contrast(1.05)'
          : `blur(${blur}px) brightness(0.92) contrast(1.05) grayscale(0.1)`;
    }
  });
}

function stepCarousel() {
  tickTransition();
  if (!dragging) rot += rotV;

  if (introP > 0.8 && !revealDone) {
    revealDone = true;
    gsap.to('nav',   { opacity: 1, y: 0, duration: 1.5, ease: 'power3.out' });
    gsap.to('#hero', { opacity: 1, y: 0, duration: 1.5, ease: 'power3.out', delay: 0.15 });
    gsap.to('#foot', {
      opacity: 1, y: 0, duration: 1.5, ease: 'power3.out', delay: 0.35,
      onComplete() { document.getElementById('foot').style.pointerEvents = 'all'; }
    });
  }
  placeCards();
}

// Drag — desktop
gstage.addEventListener('mousedown', e => { dragging = true; lastDX = e.clientX; dragV = 0; e.stopPropagation(); });
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastDX;
  dragV = -dx * .35; rot -= dx * .3; lastDX = e.clientX;
});
document.addEventListener('mouseup', () => { if (dragging) { dragging = false; rotV = dragV * .5; } });

// Touch
let tLX = 0;
gstage.addEventListener('touchstart',  e => { dragging = true; tLX = e.touches[0].clientX; dragV = 0; }, { passive: true });
gstage.addEventListener('touchmove',   e => {
  if (!dragging) return;
  const dx = e.touches[0].clientX - tLX;
  dragV = -dx * .35; rot -= dx * .3; tLX = e.touches[0].clientX;
  mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY;
}, { passive: true });
gstage.addEventListener('touchend', () => { dragging = false; rotV = dragV * .5; });

// ─────────────────────────────────────────────
// FULLSCREEN CARD — GSAP clip-path
// ─────────────────────────────────────────────
const fsEl    = document.getElementById('fs');
const fsImgEl = document.getElementById('fsimg');
const fsTitEl = document.getElementById('fstit');
const fsYrEl  = document.getElementById('fsyr');
const fsDeEl  = document.getElementById('fsde');
const fsxEl   = document.getElementById('fsx');
let fsOpen = false;

function openFS(i) {
  const p = PROJECTS[i];
  fsImgEl.src = p.img; fsTitEl.textContent = p.name;
  fsYrEl.textContent = p.year + ' — ' + p.desc; fsDeEl.textContent = p.full;
  fsOpen = true;
  gsap.killTweensOf([fsEl, '#foot']);
  gsap.set(fsEl, { opacity: 1, pointerEvents: 'all' });
  gsap.fromTo(fsEl,
    { clipPath: 'inset(50% 50% 50% 50%)' },
    { clipPath: 'inset(0% 0% 0% 0%)', duration: 0.65, ease: 'power2.inOut' }
  );
  if (revealDone) {
    gsap.to('#foot', { opacity: 0, duration: 0.25 });
    document.getElementById('foot').style.pointerEvents = 'none';
  }
}

function closeFS() {
  fsOpen = false;
  gsap.killTweensOf([fsEl, '#foot']);
  gsap.to(fsEl, {
    clipPath: 'inset(50% 50% 50% 50%)', duration: 0.5, ease: 'power2.inOut',
    onComplete() { gsap.set(fsEl, { opacity: 0, pointerEvents: 'none' }); }
  });
  if (revealDone) {
    gsap.to('#foot', { opacity: 1, duration: 0.5, delay: 0.35 });
    setTimeout(() => { document.getElementById('foot').style.pointerEvents = 'all'; }, 600);
  }
}

fsxEl.addEventListener('click', closeFS);
document.addEventListener('keydown', e => { if (e.key === 'Escape' && fsOpen) closeFS(); });

// ─────────────────────────────────────────────
// HERO PARALLAX
// ─────────────────────────────────────────────
const htitle = document.getElementById('htitle');
let hx = 0, hy = 0, thx = 0, thy = 0;
let grX = 0, grY = 0, tgrX = 0, tgrY = 0;

document.addEventListener('mousemove', e => {
  thx  =  (e.clientX - W / 2) / W * 12;
  thy  =  (e.clientY - H / 2) / H * 6;
  tgrX = -(e.clientY - H / 2) / H * 6;
  tgrY =  (e.clientX - W / 2) / W * 8;
});
if ('ontouchstart' in window) {
  document.addEventListener('touchmove', e => {
    const t = e.touches[0];
    mouseX = t.clientX; mouseY = t.clientY;
    thx = (t.clientX - W / 2) / W * 12;
    thy = (t.clientY - H / 2) / H * 6;
  }, { passive: true });
}

// ─────────────────────────────────────────────
// MAIN LOOP — single rAF; pauses on hidden tab
// ─────────────────────────────────────────────
let rafId   = null;
let running = true;

function loop(now) {
  if (!running) { rafId = null; return; }
  rafId = requestAnimationFrame(loop);
  bgLoop(now);
  stepCarousel();
  hx += (thx - hx) * .08; hy += (thy - hy) * .08;
  htitle.style.transform = `translate(${hx}px,${hy}px)`;
  grX += (tgrX - grX) * .05; grY += (tgrY - grY) * .05;
  gcont.style.transform = `rotateX(${grX}deg) rotateY(${grY}deg)`;
}

document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    running = false;
    if (rafId) { cancelAnimationFrame(rafId); rafId = null; }
  } else {
    if (!rafId) {
      running = true;
      lastPhysicsTick = Date.now();
      lastBgTick = 0;
      rafId = requestAnimationFrame(loop);
    }
  }
});

// ─────────────────────────────────────────────
// HAMBURGER
// ─────────────────────────────────────────────
const ham    = document.getElementById('ham');
const mobNav = document.getElementById('mob-nav');
ham.addEventListener('click', () => { ham.classList.toggle('active'); mobNav.classList.toggle('active'); });
mobNav.querySelectorAll('a').forEach(a => {
  a.addEventListener('click', () => { ham.classList.remove('active'); mobNav.classList.remove('active'); });
});

// ─────────────────────────────────────────────
// RESIZE — debounced
// ─────────────────────────────────────────────
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => { W = window.innerWidth; H = window.innerHeight; resize(); }, 150);
});

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
glInit(); // compile GLSL, create GPU buffers

gsap.set('nav',   { y: 30 });
gsap.set('#hero', { xPercent: -50, y: 30 });
gsap.set('#foot', { y: 30 });

resize();
rafId = requestAnimationFrame(loop);
</script>
